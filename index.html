<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAM Studio Vault</title>
  <style>
    /* Preloader Styles - Black & White Theme */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
    }

    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #preloader.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .preloader-logo {
      width: 180px;
      height: auto;
      margin-bottom: 50px;
      animation: logoPulse 2s ease-in-out infinite;
      filter: brightness(1) drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
    }

    @keyframes logoPulse {

      0%,
      100% {
        transform: scale(1);
        filter: brightness(1) drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
      }

      50% {
        transform: scale(1.05);
        filter: brightness(1.2) drop-shadow(0 0 50px rgba(255, 255, 255, 0.5));
      }
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    /* Elegant Line Loader */
    .loader-line {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .loader-line::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      animation: lineSlide 1.5s ease-in-out infinite;
    }

    @keyframes lineSlide {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }

    /* Spinning Circle */
    .loader-circle {
      width: 50px;
      height: 50px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 12px;
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: textFade 2s ease-in-out infinite;
    }

    @keyframes textFade {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    /* Elegant Dots */
    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: 0s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dotPulse {

      0%,
      80%,
      100% {
        transform: scale(0.4);
        opacity: 0.3;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Subtle ambient glow */
    .ambient-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.8;
      }
    }
  </style>
</head>

<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="ambient-glow"></div>
    <img src="/logo.png" alt="RAM Studio Vault" class="preloader-logo" />
    <div class="loader-container">
      <div class="loader-circle"></div>
      <div class="loader-line"></div>
      <div class="loading-text">Loading</div>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Hide preloader when page is fully loaded
    window.addEventListener('load', function () {
      setTimeout(function () {
        const preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.classList.add('fade-out');
          setTimeout(function () {
            preloader.style.display = 'none';
          }, 600);
        }
      }, 1500); // Show preloader for at least 1.5 seconds for visual effect
    });
  </script>
</body>

</html>
